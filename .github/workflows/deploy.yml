name: Deploy Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate embedded script
        run: npm run generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Deploy to Cloudflare Workers
        run: npm exec -- wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set admin password secret
        run: |
          if [ -n "$ADMIN_PASSWORD" ]; then
            printf '%s' "$ADMIN_PASSWORD" | npm exec -- wrangler secret put ADMIN_PASSWORD
          else
            echo "ADMIN_PASSWORD secret is not set; skipping Worker secret update."
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
